name: Release

# Builds and publishes the Basecamp desktop app to a GitHub Release whenever a
# v* tag is pushed. Each matrix entry builds natively on its own arch (no cross
# compilation) so the staged CPython runtime and node-pty prebuilds match the
# target. Wave-1 is unsigned: mac code signing is disabled and notarize.cjs
# skips when no Apple creds are present, so no signing secrets are required.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS arm64
            eb_args: --mac dmg zip --arm64
          - os: macos-13
            label: macOS x64
            eb_args: --mac dmg zip --x64
          - os: windows-latest
            label: Windows x64
            eb_args: --win nsis msi --x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.11.8'

      - name: Install workspace dependencies
        # Retry npm ci: postinstall scripts download the Electron binary (and
        # other native prebuilds) at install time, which intermittently times
        # out on hosted runners (connect ETIMEDOUT to github). bash is available
        # on every runner OS, so this loop is portable across the matrix.
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "npm ci attempt $attempt"
            if npm ci; then
              exit 0
            fi
            echo "npm ci failed (attempt $attempt); cleaning node_modules and retrying in 15s"
            rm -rf node_modules apps/desktop/node_modules
            sleep 15
          done
          echo "npm ci failed after 3 attempts"
          exit 1

      - name: Build renderer + stage backend
        working-directory: apps/desktop
        run: npm run build

      - name: Package and publish to GitHub Release
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Wave-1 ships unsigned: skip auto-discovery of a Developer ID cert so
          # electron-builder ad-hoc signs instead of failing on a missing cert.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder ${{ matrix.eb_args }} --publish always

  publish-release:
    name: Publish release (un-draft)
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # electron-builder uploads each matrix artifact to the GitHub release, but
      # the release can remain a draft -- a draft release 404s the auto-update
      # feed (latest-mac.yml / latest.yml), so every client's update check fails.
      # Force the tag's release to published once all artifacts are uploaded.
      - name: Mark release published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
